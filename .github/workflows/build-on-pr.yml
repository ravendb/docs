name: Build Docusaurus on PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier
        run: npm run prettier

      - name: Validate redirects.json
        run: npm run validate-redirects

      - name: Unit tests
        run: npm test

      - name: Build Docusaurus & Check Internal Links
        # DOCUSAURUS_STRICT=true enforces Docusaurus's own strict checks
        # (broken links, missing translations, etc.). DOCUSAURUS_STRICT_CANONICALS
        # is a separate gate for the canonical-redirects plugin — it fails the
        # build on any canonical URL that doesn't resolve to a real current-
        # version route, catching missing redirects.json entries whenever a
        # page is moved or renamed.
        run: npx cross-env DOCUSAURUS_VERSIONS='6.2, 7.1, current' DOCUSAURUS_STRICT=true DOCUSAURUS_STRICT_CANONICALS=true npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: build/
          retention-days: 7
